<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logo Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet" />
  <style>
    body { background: #070A12; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 3rem; margin: 0; padding: 4rem 2rem; box-sizing: border-box; }
    .label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: #6B7A99; margin-bottom: 0.75rem; text-align: center; }
    .row { display: flex; flex-direction: column; align-items: center; }
    .wm { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(4rem, 12vw, 7rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }

    /* 1 — atual */
    .v1 .win { color: #E8EDF8; }
    .v1 .serv { background: linear-gradient(90deg, #3E7BFA 0%, #0D52B4 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* 2 — WIN azulado suave */
    .v2 .win { color: #C4D4F8; }
    .v2 .serv { background: linear-gradient(90deg, #3E7BFA 0%, #0D52B4 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* 3 — WIN azulado mais forte */
    .v3 .win { color: #9BBCFA; }
    .v3 .serv { background: linear-gradient(90deg, #3E7BFA 0%, #0D52B4 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* 4 — fluxo contínuo: WIN branco domina, azul só no fim */
    .v4 .win { background: linear-gradient(90deg, #E8EDF8 0%, #E8EDF8 60%, #9BBCFA 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .v4 .serv { background: linear-gradient(90deg, #3E7BFA 0%, #0D52B4 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* 5 — SERV branco, WIN gradiente (invertido) */
    .v5 .win { background: linear-gradient(90deg, #3E7BFA 0%, #0D52B4 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .v5 .serv { color: #E8EDF8; }
  </style>
</head>
<body>

  <div class="row">
    <div class="label">1 — atual (WIN branco, SERV gradiente)</div>
    <div class="wm v1"><span class="win">WIN</span><span class="serv">SERV</span></div>
  </div>

  <div class="row">
    <div class="label">2 — WIN azul-claro suave #C4D4F8</div>
    <div class="wm v2"><span class="win">WIN</span><span class="serv">SERV</span></div>
  </div>

  <div class="row">
    <div class="label">3 — WIN azul-claro #9BBCFA (mesma família)</div>
    <div class="wm v3"><span class="win">WIN</span><span class="serv">SERV</span></div>
  </div>

  <div class="row">
    <div class="label">4 — fluxo contínuo: WIN branco→azul, SERV azul→navy</div>
    <div class="wm v4"><span class="win">WIN</span><span class="serv">SERV</span></div>
  </div>

  <div class="row">
    <div class="label">5 — invertido: WIN gradiente, SERV branco</div>
    <div class="wm v5"><span class="win">WIN</span><span class="serv">SERV</span></div>
  </div>

</body>
</html>
